<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Autobahn Legenden">
<meta name="theme-color" content="#0b0d12">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<title>Autobahn Legenden – BMW Klassiker Racer</title>
<style>
  :root{
    --amber:#ff9d2e;        /* klassische BMW Tacho-Beleuchtung */
    --amber-dim:#8a5418;
    --night:#0b0d12;
    --panel:#14171f;
    --line:#2a2f3c;
    --white:#e8e6df;
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;
    -webkit-user-select:none;user-select:none;-webkit-touch-callout:none}
  html,body{height:100%;overflow:hidden;background:var(--night);font-family:"Segoe UI",system-ui,sans-serif;color:var(--white)}
  #game{display:block;width:100vw;height:100vh;touch-action:none}

  /* ---------- Overlays ---------- */
  .screen{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;
    background:radial-gradient(ellipse at 50% 30%, #161a24 0%, var(--night) 70%);z-index:10;padding:16px;text-align:center}
  .hidden{display:none !important}
  h1{font-size:clamp(28px,7vw,54px);letter-spacing:.14em;font-weight:800;color:var(--amber);
    text-shadow:0 0 18px rgba(255,157,46,.45);text-transform:uppercase}
  .sub{margin-top:6px;font-size:clamp(12px,3vw,15px);letter-spacing:.32em;color:#9aa0ad;text-transform:uppercase}
  .rule{width:min(420px,80vw);height:1px;background:linear-gradient(90deg,transparent,var(--amber-dim),transparent);margin:22px 0}

  .cars{display:flex;gap:14px;flex-wrap:wrap;justify-content:center}
  .carCard{background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:14px 16px;width:172px;cursor:pointer;
    transition:transform .12s,border-color .12s}
  .carCard:hover,.carCard:focus-visible{transform:translateY(-3px);border-color:var(--amber)}
  .carCard.sel{border-color:var(--amber);box-shadow:0 0 0 1px var(--amber),0 0 24px rgba(255,157,46,.25)}
  .carCard canvas{width:120px;height:78px;image-rendering:pixelated}
  .carName{font-weight:700;font-size:15px;margin-top:6px}
  .carSub{font-size:11px;color:#9aa0ad;margin-bottom:8px}
  .stat{display:flex;align-items:center;gap:6px;font-size:10px;color:#9aa0ad;margin-top:3px;text-transform:uppercase;letter-spacing:.08em}
  .bar{flex:1;height:4px;background:#252a36;border-radius:2px;overflow:hidden}
  .bar i{display:block;height:100%;background:var(--amber)}

  .btn{margin-top:26px;background:var(--amber);color:#1a1206;border:none;font-weight:800;font-size:16px;
    letter-spacing:.18em;text-transform:uppercase;padding:14px 42px;border-radius:6px;cursor:pointer}
  .btn:disabled{opacity:.35;cursor:default}
  .btn:focus-visible{outline:2px solid var(--white);outline-offset:3px}
  .hint{margin-top:16px;font-size:12px;color:#6f7684;line-height:1.7}

  #overTitle{color:var(--amber)}
  .resultRow{display:flex;gap:34px;margin-top:8px}
  .resultRow div{text-align:center}
  .resultRow b{display:block;font-size:clamp(22px,6vw,34px);color:var(--amber);font-variant-numeric:tabular-nums}
  .resultRow span{font-size:11px;letter-spacing:.2em;color:#9aa0ad;text-transform:uppercase}

  /* ---------- Touch controls ---------- */
  #touchUI{position:fixed;left:0;right:0;bottom:0;display:flex;justify-content:space-between;align-items:flex-end;
    padding:0 14px 18px;z-index:5;pointer-events:none}
  .tbtn{pointer-events:auto;width:74px;height:74px;border-radius:50%;border:1px solid var(--line);
    background:rgba(20,23,31,.55);backdrop-filter:blur(3px);color:var(--amber);font-size:26px;
    display:flex;align-items:center;justify-content:center;user-select:none}
  .tbtn:active{background:rgba(255,157,46,.25)}
  #brakeBtn{width:64px;height:64px;font-size:12px;letter-spacing:.1em;font-weight:700}
  #muteBtn{position:fixed;top:12px;right:12px;z-index:6;pointer-events:auto;width:40px;height:40px;border-radius:8px;
    border:1px solid var(--line);background:rgba(20,23,31,.6);color:var(--amber);font-size:17px}
  @media (hover:hover) and (pointer:fine){ #touchUI{display:none} }
</style>
</head>
<body>

<canvas id="game"></canvas>
<button id="muteBtn" class="hidden" aria-label="Ton an/aus">♪</button>

<div id="touchUI" class="hidden">
  <button class="tbtn" id="leftBtn" aria-label="Links lenken">◀</button>
  <button class="tbtn" id="brakeBtn" aria-label="Bremsen">BREMSE</button>
  <button class="tbtn" id="rightBtn" aria-label="Rechts lenken">▶</button>
</div>

<!-- ---------- Startscreen ---------- -->
<div id="menu" class="screen">
  <h1>Autobahn Legenden</h1>
  <div class="sub">Erzgebirge · Freistaat Sachsen · 198X</div>
  <div class="rule"></div>
  <div class="cars" id="carList"></div>
  <button class="btn" id="startBtn" disabled>Zündung</button>
  <div class="hint">
    Tastatur: ◀ ▶ lenken · ▼ bremsen &nbsp;|&nbsp; Handy: Tasten unten<br>
    Erreiche die Kontrolle, bevor die Zeit abläuft. Überholen gibt Punkte.
  </div>
</div>

<!-- ---------- Game Over ---------- -->
<div id="gameover" class="screen hidden">
  <h1 id="overTitle">Etappe beendet</h1>
  <div class="rule"></div>
  <div class="resultRow">
    <div><b id="resKm">0,0</b><span>Kilometer</span></div>
    <div><b id="resOvr">0</b><span>Überholt</span></div>
    <div><b id="resScore">0</b><span>Punkte</span></div>
  </div>
  <button class="btn" id="againBtn">Nochmal</button>
</div>

<script>
"use strict";
/* =====================================================================
   AUTOBAHN LEGENDEN – Pseudo-3D Racer für BMW-Klassiker-Fans
   ===================================================================== */

const cv = document.getElementById("game");
const cx = cv.getContext("2d");
let W=0, H=0, DPR=1;
function resize(){
  DPR = Math.min(window.devicePixelRatio||1, 2);
  W = Math.floor(window.innerWidth);
  H = Math.floor(window.innerHeight);
  cv.width = W*DPR; cv.height = H*DPR;
  cv.style.width = W+"px"; cv.style.height = H+"px";
  cx.setTransform(DPR,0,0,DPR,0,0);
}
window.addEventListener("resize", resize); resize();

/* ---------------- Fahrzeuge ---------------- */
const MODELS = [
  { id:"e28", name:"E28 535i", sub:"Die Haifischnase · 1985",
    color:"#3b5d8f", color2:"#2b4368",            // Arktisblau
    topSpeed:218, accel:34, grip:0.86 },
  { id:"e30", name:"E30 325i", sub:"Der Kurvenkönig · 1987",
    color:"#b8332a", color2:"#8a221c",            // Zinnoberrot
    topSpeed:205, accel:38, grip:1.0 },
  { id:"e34", name:"E34 540i", sub:"Der Autobahnjäger · 1993",
    color:"#23262b", color2:"#101216",            // Diamantschwarz
    topSpeed:240, accel:40, grip:0.78 },
];
let selModel = null;

/* Heckansicht eines boxigen Klassikers prozedural zeichnen */
function drawBmwRear(g, x, y, w, m, steer=0, braking=false){
  const h = w*0.62;
  g.save();
  g.translate(x, y);
  if (steer) g.transform(1, 0, steer*0.06, 1, 0, 0); // leichte Scherung beim Lenken
  const bx=-w/2, by=-h;
  // Schatten
  g.fillStyle="rgba(0,0,0,.35)";
  g.beginPath(); g.ellipse(0, 2, w*0.55, w*0.10, 0, 0, Math.PI*2); g.fill();
  // Räder
  g.fillStyle="#0a0a0a";
  g.fillRect(bx+w*0.02, -h*0.30, w*0.13, h*0.34);
  g.fillRect(bx+w*0.85, -h*0.30, w*0.13, h*0.34);
  // Karosserie
  g.fillStyle=m.color;
  g.fillRect(bx+w*0.05, by+h*0.30, w*0.90, h*0.62);
  // Dach + C-Säule (Hofmeister-Knick angedeutet)
  g.fillStyle=m.color2;
  g.beginPath();
  g.moveTo(bx+w*0.16, by+h*0.32);
  g.lineTo(bx+w*0.22, by);
  g.lineTo(bx+w*0.78, by);
  g.lineTo(bx+w*0.84, by+h*0.32);
  g.closePath(); g.fill();
  // Heckscheibe
  g.fillStyle="#1c2733";
  g.beginPath();
  g.moveTo(bx+w*0.22, by+h*0.30);
  g.lineTo(bx+w*0.26, by+h*0.06);
  g.lineTo(bx+w*0.74, by+h*0.06);
  g.lineTo(bx+w*0.78, by+h*0.30);
  g.closePath(); g.fill();
  // Heckleuchten – breite rote Bänder, sehr 80er BMW
  g.fillStyle = braking ? "#ff3b2f" : "#a31410";
  if (braking){ g.shadowColor="#ff3b2f"; g.shadowBlur=12; }
  g.fillRect(bx+w*0.07, by+h*0.42, w*0.30, h*0.13);
  g.fillRect(bx+w*0.63, by+h*0.42, w*0.30, h*0.13);
  g.shadowBlur=0;
  // Kennzeichenmulde + Stoßstange
  g.fillStyle="#d8d8d0";
  g.fillRect(-w*0.13, by+h*0.44, w*0.26, h*0.10);
  g.fillStyle="#0e0f11";
  g.font = `bold ${Math.max(4,w*0.07)}px monospace`;
  g.textAlign="center"; g.textBaseline="middle";
  g.fillText("ERZ", 0, by+h*0.49);
  g.fillStyle="#41454d";
  g.fillRect(bx+w*0.03, by+h*0.74, w*0.94, h*0.14);
  // Nieren-Andeutung als Embleme? Nein – Roundel-Punkt am Heck
  g.fillStyle="#cfd5dd";
  g.beginPath(); g.arc(0, by+h*0.36, w*0.025, 0, Math.PI*2); g.fill();
  g.restore();
}

/* Karten im Menü aufbauen */
const carList = document.getElementById("carList");
MODELS.forEach((m,i)=>{
  const card=document.createElement("div");
  card.className="carCard"; card.tabIndex=0; card.setAttribute("role","button");
  card.innerHTML=`<canvas width="120" height="78"></canvas>
    <div class="carName">${m.name}</div><div class="carSub">${m.sub}</div>
    <div class="stat">Tempo<div class="bar"><i style="width:${(m.topSpeed-190)/55*100}%"></i></div></div>
    <div class="stat">Antritt<div class="bar"><i style="width:${(m.accel-30)/12*100}%"></i></div></div>
    <div class="stat">Grip<div class="bar"><i style="width:${m.grip*100}%"></i></div></div>`;
  const g=card.querySelector("canvas").getContext("2d");
  drawBmwRear(g, 60, 66, 86, m);
  const pick=()=>{
    document.querySelectorAll(".carCard").forEach(c=>c.classList.remove("sel"));
    card.classList.add("sel"); selModel=m;
    document.getElementById("startBtn").disabled=false;
  };
  card.addEventListener("click",pick);
  card.addEventListener("keydown",e=>{ if(e.key==="Enter"||e.key===" ") {e.preventDefault();pick();} });
  carList.appendChild(card);
});

/* ---------------- Strecke ---------------- */
const SEG_LEN = 200;            // Länge eines Segments (Welt-Einheiten)
const ROAD_W  = 2200;           // halbe Fahrbahnbreite
const DRAW_N  = 110;            // sichtbare Segmente
const CAM_H   = 1050;
const CAM_DEPTH = 1 / Math.tan((85/2)*Math.PI/180);

const ORTE = ["Aue 8","Schwarzenberg 14","Annaberg 21","Chemnitz 33","Zwickau 27","Schneeberg 11","Eibenstock 17","Zschorlau 5"];

let segments=[], trackLen=0;

function addSection(count, curve, hill=0){
  const startY = segments.length ? segments[segments.length-1].p2y : 0;
  for(let i=0;i<count;i++){
    const t=i/count;
    const y = startY + hill * (0.5 - 0.5*Math.cos(Math.PI*t)) ;
    const n = segments.length;
    segments.push({
      i:n, curve, p1y: n? segments[n-1].p2y : 0, p2y: y,
      sprites:[], cars:[]
    });
  }
}
function buildTrack(){
  segments=[];
  addSection(60, 0);
  addSection(70, 1.6, 600);
  addSection(50, 0);
  addSection(80,-2.4);
  addSection(60, 0,-900);
  addSection(70, 3.0, 500);
  addSection(40, 0);
  addSection(90,-1.4,-400);
  addSection(60, 2.2);
  addSection(70, 0, 800);
  addSection(80,-3.0,-500);
  addSection(50, 0);
  trackLen = segments.length * SEG_LEN;

  // Randobjekte: Fichten, Leitpfosten, Schilder
  for(let n=0;n<segments.length;n++){
    if(n%9===0)  segments[n].sprites.push({type:"tree",  off:-1.55 - Math.random()*1.4, s:1+Math.random()*0.8});
    if(n%11===0) segments[n].sprites.push({type:"tree",  off: 1.55 + Math.random()*1.4, s:1+Math.random()*0.8});
    if(n%18===0) segments[n].sprites.push({type:"post",  off:-1.18});
    if(n%18===9) segments[n].sprites.push({type:"post",  off: 1.18});
    if(n%140===70) segments[n].sprites.push({type:"sign", off: 1.5, text: ORTE[(n/140|0)%ORTE.length]});
  }
  // Kontrollpunkt-Banner
  segments[Math.floor(segments.length*0.55)].checkpoint = true;
  segments[2].startline = true;
}

/* ---------------- Verkehr ---------------- */
const TRAFFIC_COLORS=["#c9c9c2","#7a8a96","#5d7a4f","#9a6a3a","#586273","#b0a14e"];
let traffic=[];
function spawnTraffic(count){
  traffic=[];
  for(let i=0;i<count;i++){
    traffic.push({
      z: Math.random()*trackLen,
      off: [-0.62, -0.2, 0.35, 0.7][Math.floor(Math.random()*4)],
      speed: (70+Math.random()*55)/3.6 * 60,       // Welt-Einheiten/s
      color: TRAFFIC_COLORS[i%TRAFFIC_COLORS.length],
      truck: Math.random()<0.22,
      passed:false
    });
  }
}

/* ---------------- Spielzustand ---------------- */
const ST={MENU:0,PLAY:1,OVER:2};
let state=ST.MENU;
let pos=0, playerX=0, speed=0, lapsZ=0;
let kmTotal=0, overtakes=0, score=0, timer=60, msgText="", msgT=0, crashT=0, shake=0;
let checkpointArmed=true;

const keys={};
window.addEventListener("keydown",e=>{ keys[e.key]=true;
  if(["ArrowLeft","ArrowRight","ArrowUp","ArrowDown"," "].includes(e.key)) e.preventDefault(); });
window.addEventListener("keyup",e=>{ keys[e.key]=false; });

let touchL=false,touchR=false,touchB=false;
function bindTouch(id, set){
  const el=document.getElementById(id);
  ["pointerdown","pointerenter"].forEach(ev=>el.addEventListener(ev,e=>{ if(e.buttons||e.type==="pointerdown"){set(true); e.preventDefault();}}));
  ["pointerup","pointercancel","pointerleave"].forEach(ev=>el.addEventListener(ev,()=>set(false)));
}
bindTouch("leftBtn", v=>touchL=v);
bindTouch("rightBtn",v=>touchR=v);
bindTouch("brakeBtn",v=>touchB=v);
// iOS: Lupe, Textauswahl & Kontextmenü beim langen Drücken verhindern
document.addEventListener("contextmenu",e=>e.preventDefault());
const tui=document.getElementById("touchUI");
tui.addEventListener("touchstart",e=>e.preventDefault(),{passive:false});
tui.addEventListener("touchend",e=>e.preventDefault(),{passive:false});

/* ---------------- Sound: Reihensechser ---------------- */
let AC=null, oscA=null, oscB=null, gain=null, muted=false;
function initAudio(){
  if(AC) return;
  try{
    AC = new (window.AudioContext||window.webkitAudioContext)();
    gain=AC.createGain(); gain.gain.value=0;
    const lp=AC.createBiquadFilter(); lp.type="lowpass"; lp.frequency.value=900;
    oscA=AC.createOscillator(); oscA.type="sawtooth";
    oscB=AC.createOscillator(); oscB.type="square";
    const gB=AC.createGain(); gB.gain.value=0.35;
    oscA.connect(lp); oscB.connect(gB); gB.connect(lp);
    lp.connect(gain); gain.connect(AC.destination);
    oscA.start(); oscB.start();
  }catch(e){ AC=null; }
}
function engineSound(){
  if(!AC||muted){ if(gain) gain.gain.value=0; return; }
  const r = speed/ (selModel.topSpeed/3.6*60);
  const f = 48 + r*170;
  oscA.frequency.setTargetAtTime(f, AC.currentTime, .05);
  oscB.frequency.setTargetAtTime(f*1.5+3, AC.currentTime, .05);
  gain.gain.setTargetAtTime(state===ST.PLAY ? .035+r*.05 : 0, AC.currentTime, .1);
}
function blip(freq, dur=.12, type="square", vol=.12){
  if(!AC||muted) return;
  const o=AC.createOscillator(), g=AC.createGain();
  o.type=type; o.frequency.value=freq;
  g.gain.setValueAtTime(vol,AC.currentTime);
  g.gain.exponentialRampToValueAtTime(.001,AC.currentTime+dur);
  o.connect(g); g.connect(AC.destination);
  o.start(); o.stop(AC.currentTime+dur);
}
function crashSound(){
  if(!AC||muted) return;
  const len=AC.sampleRate*.3, buf=AC.createBuffer(1,len,AC.sampleRate), d=buf.getChannelData(0);
  for(let i=0;i<len;i++) d[i]=(Math.random()*2-1)*(1-i/len);
  const s=AC.createBufferSource(), g=AC.createGain(); g.gain.value=.3;
  s.buffer=buf; s.connect(g); g.connect(AC.destination); s.start();
}
document.getElementById("muteBtn").addEventListener("click",e=>{
  muted=!muted; e.target.textContent = muted?"✕":"♪";
});

/* ---------------- Start / Restart ---------------- */
document.getElementById("startBtn").addEventListener("click",startGame);
document.getElementById("againBtn").addEventListener("click",()=>{
  document.getElementById("gameover").classList.add("hidden");
  document.getElementById("menu").classList.remove("hidden");
  state=ST.MENU;
});
function startGame(){
  initAudio(); if(AC&&AC.state==="suspended") AC.resume();
  buildTrack(); spawnTraffic(22);
  pos=0; playerX=0; speed=0; kmTotal=0; overtakes=0; score=0; timer=60;
  checkpointArmed=true; crashT=0; shake=0;
  msg("ETAPPE 1 · GUTE FAHRT");
  document.getElementById("menu").classList.add("hidden");
  document.getElementById("muteBtn").classList.remove("hidden");
  if(matchMedia("(hover:none)").matches) document.getElementById("touchUI").classList.remove("hidden");
  state=ST.PLAY;
}
function endGame(title){
  state=ST.OVER;
  document.getElementById("touchUI").classList.add("hidden");
  document.getElementById("overTitle").textContent=title;
  document.getElementById("resKm").textContent=(kmTotal).toFixed(1).replace(".",",");
  document.getElementById("resOvr").textContent=overtakes;
  document.getElementById("resScore").textContent=Math.floor(score);
  document.getElementById("gameover").classList.remove("hidden");
}
function msg(t){ msgText=t; msgT=2.6; }

/* ---------------- Update ---------------- */
function findSeg(z){ return segments[Math.floor(z/SEG_LEN)%segments.length]; }

function update(dt){
  if(state!==ST.PLAY) return;

  const maxSpd = selModel.topSpeed/3.6*60;       // Welt-Einheiten/s
  const left  = keys.ArrowLeft||keys.a||touchL;
  const right = keys.ArrowRight||keys.d||touchR;
  const brake = keys.ArrowDown||keys.s||touchB||keys[" "];

  // Gas: Auto-Throttle (mobilfreundlich), Pfeil hoch gibt nichts extra
  if(crashT>0){ crashT-=dt; speed=Math.max(speed - maxSpd*1.5*dt, maxSpd*0.12); }
  else if(brake) speed=Math.max(0, speed - maxSpd*1.1*dt);
  else speed=Math.min(maxSpd, speed + selModel.accel*9*dt);

  // Offroad bremst
  if(Math.abs(playerX)>1.02){
    speed=Math.max(speed*0.985, Math.min(speed, maxSpd*0.35));
    shake=Math.max(shake, 2.5);
  }

  const seg=findSeg(pos);
  const spdR=speed/maxSpd;

  // Lenken + Fliehkraft
  const steer=(right?1:0)-(left?1:0);
  playerX += steer * 2.3 * selModel.grip * dt * (0.45+0.55*spdR);
  playerX -= seg.curve * 0.00009 * speed * dt * (1.6-selModel.grip*0.6);
  playerX = Math.max(-1.9, Math.min(1.9, playerX));

  // Vorwärts
  pos += speed*dt;
  while(pos>=trackLen){ pos-=trackLen; }
  kmTotal += speed*dt/1000 * 0.55;               // grobe km-Skalierung
  score += speed*dt*0.004;

  // Timer
  timer-=dt;
  if(timer<=0){ engineOff(); endGame("Zeit abgelaufen"); return; }

  // Kontrolle
  const cpSeg = segments.find(s=>s.checkpoint);
  const dCp = (cpSeg.i*SEG_LEN - pos + trackLen)%trackLen;
  if(checkpointArmed && dCp < speed*dt + 5){
    timer+=32; score+=500; overFlash=1;
    msg("KONTROLLE · +32 SEK");
    blip(880,.1); setTimeout(()=>blip(1175,.16),110);
    checkpointArmed=false;
    setTimeout(()=>checkpointArmed=true, 4000);
  }

  // Verkehr
  for(const c of traffic){
    const prevAhead = (c.z - pos + trackLen)%trackLen;
    c.z=(c.z + c.speed*dt)%trackLen;
    const ahead=(c.z - pos + trackLen)%trackLen;

    // Überholt? (war vor uns, ist jetzt hinter uns)
    if(prevAhead<2500 && ahead>trackLen-2500 && speed>c.speed){
      overtakes++; score+=120; c.passed=true;
      blip(520,.07,"triangle",.08);
    }
    // Kollision
    if(ahead<140 || ahead>trackLen-60){
      const cw=c.truck?0.42:0.30;
      if(Math.abs(playerX-c.off*2)<cw+0.34 && crashT<=0 && speed>c.speed*0.9 && ahead<140){
        crashT=1.1; shake=9; score=Math.max(0,score-150);
        msg("AUTSCH! BLECHSCHADEN");
        crashSound();
      }
    }
  }

  if(msgT>0) msgT-=dt;
  if(shake>0) shake=Math.max(0,shake-12*dt);
  if(overFlash>0) overFlash-=dt;
  engineSound();
}
function engineOff(){ if(gain&&AC) gain.gain.setTargetAtTime(0,AC.currentTime,.15); }
let overFlash=0;

/* ---------------- Render ---------------- */
function project(worldX, worldY, worldZ, camX, camY, camZ){
  const dz=Math.max(1,(worldZ-camZ));
  const scale=CAM_DEPTH/dz*1.0;
  return {
    x: W/2 + scale*(worldX-camX) * W/2,
    y: H*0.5 - scale*(worldY-camY) * H/2,
    w: scale * ROAD_W * W/2,
    scale
  };
}

function drawTree(x,y,s){
  const h=130*s, w=70*s;
  cx.fillStyle="#2b231c"; cx.fillRect(x-3*s,y-18*s,6*s,18*s);
  cx.fillStyle="#1d3a26";
  for(let i=0;i<3;i++){
    const ty=y-18*s-i*h*0.27, tw=w*(1-i*0.26);
    cx.beginPath(); cx.moveTo(x,ty-h*0.4); cx.lineTo(x-tw/2,ty); cx.lineTo(x+tw/2,ty); cx.closePath(); cx.fill();
  }
}
function drawPost(x,y,s){
  cx.fillStyle="#dcdcd4"; cx.fillRect(x-2.4*s,y-26*s,4.8*s,26*s);
  cx.fillStyle="#1a1a1a"; cx.fillRect(x-2.4*s,y-22*s,4.8*s,5*s);
}
function drawSign(x,y,s,text){
  const w=170*s,h=64*s;
  cx.fillStyle="#6f7684"; cx.fillRect(x-4*s,y-h-46*s,8*s,h+46*s);
  cx.fillStyle="#1456a0"; cx.fillRect(x-w/2,y-h-46*s,w,h);
  cx.strokeStyle="#e8e6df"; cx.lineWidth=Math.max(1,2.5*s); cx.strokeRect(x-w/2+3*s,y-h-43*s,w-6*s,h-6*s);
  cx.fillStyle="#fff"; cx.font=`bold ${Math.max(5,20*s)}px sans-serif`;
  cx.textAlign="center"; cx.textBaseline="middle";
  cx.fillText(text, x, y-h-46*s+h/2);
}
function drawBanner(x,y,w,text,flash){
  const h=Math.max(8,w*0.07);
  cx.fillStyle="#6f7684";
  cx.fillRect(x-w/2-4, y-h-w*0.16, 5, h+w*0.16);
  cx.fillRect(x+w/2-1, y-h-w*0.16, 5, h+w*0.16);
  cx.fillStyle= flash ? "#ff9d2e" : "#15181f";
  cx.fillRect(x-w/2, y-h-w*0.16, w, h);
  cx.fillStyle= flash ? "#1a1206" : "#ff9d2e";
  cx.font=`bold ${h*0.55}px sans-serif`; cx.textAlign="center"; cx.textBaseline="middle";
  cx.fillText(text, x, y-h/2-w*0.16);
}

function drawTrafficCar(p, c){
  const w=p.w*(c.truck?0.30:0.22);
  if(w<2) return;
  const x=p.x + c.off*p.w, y=p.y;
  if(c.truck){
    const h=w*0.95;
    cx.fillStyle="rgba(0,0,0,.3)";
    cx.beginPath(); cx.ellipse(x,y+2,w*0.55,w*0.08,0,0,Math.PI*2); cx.fill();
    cx.fillStyle="#0a0a0a";
    cx.fillRect(x-w/2+w*0.04,y-w*0.16,w*0.12,w*0.18);
    cx.fillRect(x+w/2-w*0.16,y-w*0.16,w*0.12,w*0.18);
    cx.fillStyle=c.color; cx.fillRect(x-w/2,y-h,w,h*0.92);
    cx.fillStyle="rgba(255,255,255,.12)"; cx.fillRect(x-w/2,y-h,w,h*0.1);
    cx.fillStyle="#a31410";
    cx.fillRect(x-w/2+w*0.05,y-w*0.13,w*0.16,w*0.07);
    cx.fillRect(x+w/2-w*0.21,y-w*0.13,w*0.16,w*0.07);
  } else {
    drawBmwRear(cx, x, y, w, {color:c.color, color2:"#3a3f48"});
  }
}

function render(){
  // Himmel: Abenddämmerung überm Erzgebirge
  const sky=cx.createLinearGradient(0,0,0,H*0.55);
  sky.addColorStop(0,"#0e1430");
  sky.addColorStop(0.55,"#3c2c52");
  sky.addColorStop(1,"#c96b3a");
  cx.fillStyle=sky; cx.fillRect(0,0,W,H*0.55);
  // Sonne
  cx.fillStyle="#ffb05e";
  cx.beginPath(); cx.arc(W*0.72,H*0.42,H*0.055,0,Math.PI*2); cx.fill();
  // Bergsilhouette
  cx.fillStyle="#171b2a";
  cx.beginPath(); cx.moveTo(0,H*0.55);
  for(let i=0;i<=12;i++){
    cx.lineTo(W*i/12, H*0.55 - (Math.sin(i*1.7)+1)*H*0.045 - (i%3===0?H*0.03:0));
  }
  cx.lineTo(W,H*0.55); cx.closePath(); cx.fill();
  // Boden
  cx.fillStyle="#21331f"; cx.fillRect(0,H*0.5,W,H*0.5);

  if(state===ST.MENU){ return; }

  const camZ = pos - 2*SEG_LEN;
  const baseSeg = Math.floor(pos/SEG_LEN);
  const camYW = CAM_H + findSeg(pos).p2y;
  const shX=(Math.random()-0.5)*shake*2, shY=(Math.random()-0.5)*shake*2;
  cx.save(); cx.translate(shX,shY);

  // Kurvenakkumulation
  let x=0, dx=0;
  let maxY=H;
  const drawList=[];

  for(let n=0;n<DRAW_N;n++){
    const idx=(baseSeg+n)%segments.length;
    const seg=segments[idx];
    const segZ = (baseSeg+n)*SEG_LEN;
    const camX = playerX*ROAD_W - x;
    const p1=project(-x,        seg.p1y, segZ,         playerX*ROAD_W, camYW, camZ);
    const p2=project(-(x+dx),   seg.p2y, segZ+SEG_LEN, playerX*ROAD_W, camYW, camZ);
    x+=dx; dx+=seg.curve;

    if(p2.y>=p1.y || p1.y>maxY){ /* hinter Hügel */ }
    else{
      maxY=p1.y;
      const light=(idx%2===0);
      // Gras
      cx.fillStyle=light?"#26411f":"#203619";
      cx.fillRect(0,p2.y,W,p1.y-p2.y+1);
      // Bankett
      cx.fillStyle=light?"#5a5346":"#4e4337";
      poly(p1.x-p1.w*1.06,p1.y, p1.x+p1.w*1.06,p1.y, p2.x+p2.w*1.06,p2.y, p2.x-p2.w*1.06,p2.y);
      // Fahrbahn
      cx.fillStyle=light?"#3c4049":"#383c44";
      poly(p1.x-p1.w,p1.y, p1.x+p1.w,p1.y, p2.x+p2.w,p2.y, p2.x-p2.w,p2.y);
      // Randlinien
      cx.fillStyle="#cfd2cc";
      poly(p1.x-p1.w,p1.y, p1.x-p1.w*0.965,p1.y, p2.x-p2.w*0.965,p2.y, p2.x-p2.w,p2.y);
      poly(p1.x+p1.w*0.965,p1.y, p1.x+p1.w,p1.y, p2.x+p2.w,p2.y, p2.x+p2.w*0.965,p2.y);
      // Mittellinie gestrichelt
      if(idx%3<1.5 && idx%3>=0 && idx%3===0){}
      if(idx%4<2){
        cx.fillStyle="#c9ccc4";
        poly(p1.x-p1.w*0.012,p1.y, p1.x+p1.w*0.012,p1.y, p2.x+p2.w*0.012,p2.y, p2.x-p2.w*0.012,p2.y);
      }
      // Startlinie
      if(seg.startline){
        cx.fillStyle="#e8e6df";
        poly(p1.x-p1.w,p1.y, p1.x+p1.w,p1.y, p2.x+p2.w,p2.y, p2.x-p2.w,p2.y);
      }
    }
    // Sprites & Autos sammeln (von hinten nach vorn zeichnen)
    for(const s of seg.sprites) drawList.push({z:n, seg, segZ, sprite:s, p:p1, p2});
    for(const c of traffic){
      if(Math.floor(c.z/SEG_LEN)%segments.length===idx) drawList.push({z:n, car:c, p:p1});
    }
    if(seg.checkpoint) drawList.push({z:n, banner:"KONTROLLE", p:p1, flash:overFlash>0});
  }

  // entferntestes zuerst
  drawList.sort((a,b)=>b.z-a.z);
  for(const d of drawList){
    const p=d.p; if(p.y>H||p.w<1) continue;
    if(d.sprite){
      const sx=p.x + d.sprite.off*p.w;
      const sc=p.w/420 * (d.sprite.s||1);
      if(d.sprite.type==="tree") drawTree(sx,p.y,sc*3.4);
      else if(d.sprite.type==="post") drawPost(sx,p.y,sc*3);
      else if(d.sprite.type==="sign") drawSign(sx,p.y,sc*2.4,d.sprite.text);
    } else if(d.car){
      drawTrafficCar(p,d.car);
    } else if(d.banner){
      drawBanner(p.x,p.y,p.w*2.1,d.banner,d.flash);
    }
  }

  // Spielerauto
  const steer=((keys.ArrowRight||keys.d||touchR)?1:0)-((keys.ArrowLeft||keys.a||touchL)?1:0);
  const braking=!!(keys.ArrowDown||keys.s||touchB||keys[" "])||crashT>0;
  const pw=Math.min(W*0.34, 230);
  drawBmwRear(cx, W/2, H*0.94, pw, selModel, steer, braking);

  cx.restore();

  drawHUD();
}
function poly(x1,y1,x2,y2,x3,y3,x4,y4){
  cx.beginPath(); cx.moveTo(x1,y1); cx.lineTo(x2,y2); cx.lineTo(x3,y3); cx.lineTo(x4,y4); cx.closePath(); cx.fill();
}

/* ---------------- HUD im BMW-Cockpit-Stil ---------------- */
function drawHUD(){
  if(state!==ST.PLAY&&state!==ST.OVER) return;
  const kmh=Math.round(speed*3.6/60);

  // Panel oben links
  cx.save();
  cx.font="600 12px sans-serif"; cx.textBaseline="top";
  const pad=12, pw=178, ph=86;
  cx.fillStyle="rgba(11,13,18,.72)";
  roundRect(pad,pad,pw,ph,8); cx.fill();
  cx.strokeStyle="#2a2f3c"; cx.lineWidth=1; roundRect(pad+.5,pad+.5,pw-1,ph-1,8); cx.stroke();

  cx.fillStyle="#ff9d2e";
  cx.font="800 30px 'Segoe UI',sans-serif";
  cx.textAlign="left";
  cx.fillText(String(kmh).padStart(3," "), pad+14, pad+12);
  cx.font="700 11px sans-serif"; cx.fillStyle="#8a5418";
  cx.fillText("KM/H", pad+76, pad+28);

  cx.fillStyle="#9aa0ad"; cx.font="600 11px sans-serif";
  cx.fillText(`STRECKE  ${kmTotal.toFixed(1).replace(".",",")} km`, pad+14, pad+50);
  cx.fillText(`PUNKTE   ${Math.floor(score)}`, pad+14, pad+66);

  // Timer oben mittig
  const t=Math.max(0,Math.ceil(timer));
  cx.textAlign="center";
  cx.font="800 26px 'Segoe UI',sans-serif";
  cx.fillStyle = t<=10 ? (Math.floor(performance.now()/300)%2? "#ff3b2f":"#ff9d2e") : "#ff9d2e";
  cx.fillText(String(t), W/2, pad+8);
  cx.font="700 10px sans-serif"; cx.fillStyle="#8a5418";
  cx.fillText("SEKUNDEN", W/2, pad+40);

  // Überholt oben rechts
  cx.textAlign="right";
  cx.font="800 22px 'Segoe UI',sans-serif"; cx.fillStyle="#ff9d2e";
  cx.fillText(String(overtakes), W-pad-6, pad+12);
  cx.font="700 10px sans-serif"; cx.fillStyle="#8a5418";
  cx.fillText("ÜBERHOLT", W-pad-6, pad+40);

  // Meldung
  if(msgT>0){
    cx.globalAlpha=Math.min(1,msgT);
    cx.textAlign="center";
    cx.font="800 20px sans-serif"; cx.fillStyle="#e8e6df";
    cx.shadowColor="#000"; cx.shadowBlur=8;
    cx.fillText(msgText, W/2, H*0.3);
    cx.shadowBlur=0; cx.globalAlpha=1;
  }
  cx.restore();
}
function roundRect(x,y,w,h,r){
  cx.beginPath();
  cx.moveTo(x+r,y); cx.arcTo(x+w,y,x+w,y+h,r); cx.arcTo(x+w,y+h,x,y+h,r);
  cx.arcTo(x,y+h,x,y,r); cx.arcTo(x,y,x+w,y,r); cx.closePath();
}

/* ---------------- Loop ---------------- */
let last=performance.now();
function loop(now){
  const dt=Math.min(0.05,(now-last)/1000); last=now;
  update(dt);
  render();
  requestAnimationFrame(loop);
}
buildTrack();
requestAnimationFrame(loop);
</script>
